steps:
# ── FastAPI service ────────────────────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  args:
  - build
  - -t
  - us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/stock-service:$SHORT_SHA
  - .

- name: 'gcr.io/cloud-builders/docker'
  args:
  - push
  - us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/stock-service:$SHORT_SHA

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - stock-service
  - --image=us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/stock-service:$SHORT_SHA
  - --region=us-central1
  - --platform=managed
  - --allow-unauthenticated
  - --service-account=market-analysis-sa@$PROJECT_ID.iam.gserviceaccount.com
  - --set-env-vars=PROJECT_ID=$PROJECT_ID,RAW_DS=raw,ANALYTICS_DS=analytics,PRICES_TABLE=prices,PRICES_WITH_RETURNS=Prices_with_returns,TICKERS_TABLE=tickers,INTRADAY_TABLE=IntradayPrices,IND_TABLE=Indicators,TODAY_SNAPSHOT_TABLE=today_snapshot,AGG_PRICES_TABLE=agg_prices,AGG_RETURNS_TABLE=agg_returns

# ── Streamlit dashboard ────────────────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  args:
  - build
  - -t
  - us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/dashboard:$SHORT_SHA
  - -f
  - Dockerfile.dashboard
  - .

- name: 'gcr.io/cloud-builders/docker'
  args:
  - push
  - us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/dashboard:$SHORT_SHA

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - dashboard
  - --image=us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/dashboard:$SHORT_SHA
  - --region=us-central1
  - --platform=managed
  - --allow-unauthenticated
  - --service-account=market-analysis-sa@$PROJECT_ID.iam.gserviceaccount.com
  - --set-env-vars=PROJECT_ID=$PROJECT_ID,RAW_DS=raw,ANALYTICS_DS=analytics,PRICES_TABLE=prices,PRICES_WITH_RETURNS=Prices_with_returns,TICKERS_TABLE=tickers,INTRADAY_TABLE=IntradayPrices,IND_TABLE=Indicators,TODAY_SNAPSHOT_TABLE=today_snapshot,AGG_PRICES_TABLE=agg_prices,AGG_RETURNS_TABLE=agg_returns

images:
- us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/stock-service:$SHORT_SHA
- us-central1-docker.pkg.dev/$PROJECT_ID/market-analysis/dashboard:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
